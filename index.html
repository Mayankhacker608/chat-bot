<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chatbot</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .fade-in {
        animation: fadeIn 0.35s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .glass {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
      }
    </style>
  </head>

  <body class="bg-black text-white font-[poppins] min-h-screen">
    <div class="relative min-h-screen flex items-center justify-center p-4">
      <div
        class="absolute inset-0 bg-gradient-to-br from-black via-slate-900 to-black"
      ></div>
      <div
        class="absolute inset-0 opacity-5 bg-[url('https://www.transparenttextures.com/patterns/asfalt-dark.png')]"
      ></div>

      <div
        class="relative z-10 w-full max-w-3xl h-[90vh] flex flex-col rounded-3xl border border-white/10 shadow-2xl overflow-hidden"
      >
        <header
          class="flex items-center justify-center p-4 border-b border-white/10 glass"
        >
          <div class="text-center">
            <h1 class="text-xl font-bold">AI Chatbot</h1>
            <p class="text-xs text-slate-300">Chat with Google Gemini</p>
          </div>
        </header>

        <main
          id="chatArea"
          class="flex-1 overflow-y-auto p-4 space-y-3 bg-black/20"
        ></main>

        <footer class="p-4 border-t border-white/10 glass">
          <div class="flex gap-2">
            <input
              id="messageInput"
              type="text"
              placeholder="Type a message..."
              class="flex-1 rounded-xl border border-white/20 bg-black/30 px-4 py-2 text-sm outline-none focus:border-indigo-500"
            />
            <button
              id="sendBtn"
              class="px-4 rounded-xl bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40"
              disabled
            >
              Send
            </button>
          </div>
          <p id="status" class="mt-2 text-xs text-slate-300">
            Type a message to start the conversation.
          </p>
        </footer>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
